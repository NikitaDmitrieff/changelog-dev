name: Auto Changelog

on:
  push:
    tags:
      - 'v*'

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: NikitaDmitrieff/changelog-action@v1
        with:
          api-key: ${{ secrets.CHANGELOG_DEV_API_KEY }}
          push-title: "${{ github.ref_name }}"
          push-published: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
